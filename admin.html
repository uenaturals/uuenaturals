<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UENATURALS Admin Orders</title>
  <style>
    :root {
      --primary: #556b57;
      --secondary: #8bac8f;
      --cream: #fff8f0;
      --sand: #f5e6d3;
      --text: #3d3d3d;
      --muted: #6b6b6b;
      --danger: #c05757;
      --ok: #4b7f52;
      --border: #e8d5c4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 12%, rgba(139, 172, 143, 0.2), transparent 35%),
        radial-gradient(circle at 88% 15%, rgba(201, 184, 146, 0.24), transparent 32%),
        linear-gradient(160deg, #fff8f2 0%, #f6eee2 100%);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .brand h1 {
      margin: 0;
      color: var(--primary);
      font-size: clamp(1.4rem, 3vw, 2rem);
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      width: 100%;
      margin-top: 12px;
    }

    .controls input {
      flex: 1;
      min-width: 230px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fffdf9;
      font-size: 14px;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-refresh {
      background: var(--primary);
      color: #fff;
    }

    .btn-home {
      background: #fff;
      border: 1px solid var(--border);
      color: var(--primary);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .panel {
      background: rgba(255, 255, 255, 0.93);
      border: 1px solid rgba(201, 184, 146, 0.45);
      border-radius: 16px;
      box-shadow: 0 14px 40px rgba(61, 61, 61, 0.1);
      overflow: hidden;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, var(--sand), var(--cream));
      color: var(--muted);
      font-size: 14px;
    }

    .status-ok { color: var(--ok); font-weight: 600; }
    .status-bad { color: var(--danger); font-weight: 600; }

    .desktop-table {
      width: 100%;
      border-collapse: collapse;
    }

    .desktop-table th,
    .desktop-table td {
      text-align: left;
      padding: 12px 14px;
      border-bottom: 1px solid #f0e5d8;
      vertical-align: top;
      font-size: 14px;
    }

    .desktop-table th {
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
      background: #fffdf9;
    }

    .badge {
      display: inline-block;
      background: #eef7f0;
      color: var(--ok);
      border: 1px solid #cde2d1;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .muted { color: var(--muted); }

    .mobile-list {
      display: none;
      padding: 12px;
      gap: 12px;
    }

    .order-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #fffdf9;
    }

    .order-card h3 {
      margin: 0 0 8px;
      font-size: 15px;
      color: var(--primary);
    }

    .order-card p {
      margin: 4px 0;
      font-size: 13px;
      color: var(--muted);
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      body { padding: 16px; }
      .desktop-table-wrap { display: none; }
      .mobile-list { display: grid; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <h1>UENATURALS Orders Admin</h1>
        <p>Live order feed from your checkout API</p>
      </div>
      <a class="btn btn-home" href="index.html">Back to Store</a>
      <div class="controls">
        <input id="searchInput" type="text" placeholder="Search order number, customer, payment method">
        <button id="refreshBtn" class="btn btn-refresh" type="button">Refresh Orders</button>
      </div>
    </div>

    <section class="panel">
      <div class="meta">
        <div id="countLabel">Orders: 0</div>
        <div id="apiStatus" class="status-bad">API: checking...</div>
      </div>

      <div class="desktop-table-wrap">
        <table class="desktop-table">
          <thead>
            <tr>
              <th>Order #</th>
              <th>Customer</th>
              <th>Phone</th>
              <th>Payment</th>
              <th>Total</th>
              <th>Items</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="ordersTableBody"></tbody>
        </table>
      </div>

      <div id="mobileList" class="mobile-list"></div>
      <div id="emptyState" class="empty" hidden>No orders found.</div>
    </section>
  </div>

  <script>
    const API_BASE = 'http://localhost:4000';
    let allOrders = [];

    const searchInput = document.getElementById('searchInput');
    const refreshBtn = document.getElementById('refreshBtn');
    const tableBody = document.getElementById('ordersTableBody');
    const mobileList = document.getElementById('mobileList');
    const emptyState = document.getElementById('emptyState');
    const countLabel = document.getElementById('countLabel');
    const apiStatus = document.getElementById('apiStatus');

    function formatAmount(amount) {
      return `Rs. ${Number(amount || 0).toLocaleString('en-PK')}`;
    }

    function formatDate(iso) {
      try {
        return new Date(iso).toLocaleString();
      } catch {
        return '-';
      }
    }

    function getItemCount(items) {
      if (!Array.isArray(items)) return 0;
      return items.reduce((sum, item) => sum + Number(item.quantity || 0), 0);
    }

    async function checkApiHealth() {
      try {
        const res = await fetch(`${API_BASE}/api/health`);
        if (!res.ok) throw new Error('bad health response');
        apiStatus.textContent = 'API: online';
        apiStatus.className = 'status-ok';
      } catch {
        apiStatus.textContent = 'API: offline';
        apiStatus.className = 'status-bad';
      }
    }

    async function fetchOrders() {
      refreshBtn.disabled = true;
      refreshBtn.textContent = 'Loading...';
      try {
        const res = await fetch(`${API_BASE}/api/orders`);
        if (!res.ok) throw new Error('failed');
        allOrders = await res.json();
      } catch {
        allOrders = [];
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.textContent = 'Refresh Orders';
      }
      renderOrders();
    }

    function matchesSearch(order, q) {
      if (!q) return true;
      const hay = [
        order.orderNumber,
        order.customer && order.customer.fullName,
        order.customer && order.customer.phoneNumber,
        order.paymentMethod
      ]
        .filter(Boolean)
        .join(' ')
        .toLowerCase();
      return hay.includes(q);
    }

    function renderOrders() {
      const q = searchInput.value.trim().toLowerCase();
      const rows = allOrders
        .slice()
        .sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0))
        .filter((order) => matchesSearch(order, q));

      countLabel.textContent = `Orders: ${rows.length}`;
      emptyState.hidden = rows.length > 0;

      tableBody.innerHTML = '';
      mobileList.innerHTML = '';

      for (const order of rows) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>${order.orderNumber || '-'}</strong></td>
          <td>
            <div>${order.customer && order.customer.fullName ? order.customer.fullName : '-'}</div>
            <div class="muted">${order.customer && order.customer.emailAddress ? order.customer.emailAddress : '-'}</div>
          </td>
          <td>${order.customer && order.customer.phoneNumber ? order.customer.phoneNumber : '-'}</td>
          <td><span class="badge">${order.paymentMethod || '-'}</span></td>
          <td><strong>${formatAmount(order.total)}</strong></td>
          <td>${getItemCount(order.items)}</td>
          <td>${formatDate(order.createdAt)}</td>
        `;
        tableBody.appendChild(tr);

        const card = document.createElement('article');
        card.className = 'order-card';
        card.innerHTML = `
          <h3>${order.orderNumber || '-'}</h3>
          <p><strong>Customer:</strong> ${order.customer && order.customer.fullName ? order.customer.fullName : '-'}</p>
          <p><strong>Phone:</strong> ${order.customer && order.customer.phoneNumber ? order.customer.phoneNumber : '-'}</p>
          <p><strong>Payment:</strong> ${order.paymentMethod || '-'}</p>
          <p><strong>Total:</strong> ${formatAmount(order.total)}</p>
          <p><strong>Items:</strong> ${getItemCount(order.items)}</p>
          <p><strong>Date:</strong> ${formatDate(order.createdAt)}</p>
        `;
        mobileList.appendChild(card);
      }
    }

    refreshBtn.addEventListener('click', fetchOrders);
    searchInput.addEventListener('input', renderOrders);

    checkApiHealth();
    fetchOrders();
  </script>
</body>
</html>
